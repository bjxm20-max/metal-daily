name: Metal Daily Auto-Sync

on:
  schedule:
    # Five daily runs. GitHub schedules use UTC; in Lisbon these are
    # approximately 07:00, 10:00, 13:00, 17:00 and 21:00 during summer time.
    - cron: '0 6 * * *'
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
    - cron: '0 16 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run updater
        run: python update_data.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data.json archive/; then
            echo "No changes"
            exit 0
          fi
          git add data.json archive/
          git commit -m "🔄 Auto-sync $(date -u +%Y-%m-%dT%H:%MZ)"
          git push

name: Push notify (OneSignal)

on:
  push:
    branches: [ main ]
    paths: [ 'data.json' ]
  workflow_run:
    workflows: [ 'Metal Daily Auto-Sync' ]
    types: [ completed ]
  workflow_dispatch:

jobs:
  notify:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: main

      - name: Build targeted notifications
        env:
          TRIGGER_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          python3 - <<'PY'
          import datetime as dt
          import json
          import os
          import subprocess

          current = json.load(open('data.json', encoding='utf-8'))
          trigger_head = os.environ.get('TRIGGER_HEAD_SHA', '')
          current_head = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
          if trigger_head and trigger_head == current_head:
              json.dump([], open('payloads.json', 'w', encoding='utf-8'))
              print('The updater created no commit; notifications skipped')
              raise SystemExit(0)
          try:
              raw = subprocess.check_output(['git', 'show', 'HEAD^:data.json'])
              previous = json.loads(raw)
          except Exception:
              previous = {}

          def identity(item):
              return item.get('url') or '|'.join((item.get('b',''), item.get('t',''), item.get('title',''))).lower()

          def new_items(section):
              old = {identity(item) for item in previous.get(section, [])}
              return [item for item in current.get(section, []) if identity(item) not in old]

          app_id = '4d21e493-57f4-45e2-9e89-0855f696e8b2'
          home = 'https://bjxm20-max.github.io/metal-daily/'
          payloads = []

          def add(tag, heading, message, url=home):
              payloads.append({
                  'app_id': app_id,
                  'filters': [{'field': 'tag', 'key': 'notify_' + tag, 'relation': '=', 'value': '1'}],
                  'headings': {'en': heading, 'pt': heading},
                  'contents': {'en': message, 'pt': message},
                  'url': url,
              })

          releases = new_items('recent')
          breaking = [item for item in new_items('news') + new_items('buzz') if item.get('isBreaking')]
          rumours = [item for item in new_items('news') + new_items('buzz') if item.get('status') == 'rumor']
          portugal = new_items('pt')
          core = new_items('core')

          if breaking:
              first = breaking[0]
              add('breaking', 'Metal Daily · Última hora', first.get('title', 'Nova notícia'), first.get('url', home))
          if releases:
              first = releases[0]
              add('releases', 'Novos lançamentos', f"{len(releases)} novidades · {first.get('b','')} — {first.get('t','')}")
          if rumours:
              first = rumours[0]
              add('rumours', 'Novo rumor identificado', first.get('title', 'Informação não confirmada'), first.get('url', home))
          if portugal:
              add('portugal', 'Cena portuguesa', portugal[0].get('title', 'Nova atualização nacional'), portugal[0].get('url', home))
          if core:
              add('core', 'CORE atualizado', core[0].get('title', 'Nova atualização CORE'), core[0].get('url', home))
          if dt.datetime.now(dt.timezone.utc).weekday() == 6:
              add('digest', 'Digest semanal', 'A semana Metal Daily já está consolidada.')

          json.dump(payloads, open('payloads.json', 'w', encoding='utf-8'), ensure_ascii=False)
          print(f'{len(payloads)} targeted notification(s) prepared')
          PY

      - name: Send to OneSignal
        env:
          ONESIGNAL_REST_KEY: ${{ secrets.ONESIGNAL_REST_KEY }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          key = os.environ.get('ONESIGNAL_REST_KEY', '')
          if not key:
              raise SystemExit('Missing ONESIGNAL_REST_KEY secret')
          payloads = json.load(open('payloads.json', encoding='utf-8'))
          for payload in payloads:
              request = urllib.request.Request(
                  'https://api.onesignal.com/notifications',
                  data=json.dumps(payload, ensure_ascii=False).encode('utf-8'),
                  headers={'Authorization': 'Key ' + key, 'Content-Type': 'application/json; charset=utf-8'},
                  method='POST',
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      print(response.status, response.read().decode('utf-8'))
              except urllib.error.HTTPError as error:
                  print(error.read().decode('utf-8'))
                  raise
          PY
